<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>King Maul | Executive Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Background subtle gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .avatar-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
        }

        /* Elegant initial avatar if no image */
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title {
            color: #888888;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .bio {
            color: #aaaaaa;
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 300px;
            margin: 0 auto;
        }

        .gallery-text {
            margin-top: 1.25rem;
            color: #d0d0d0;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Links Section */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .link-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        .link-icon {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
        }

        .link-arrow {
            color: #666666;
            font-size: 1.2rem;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(5px);
            color: #ffffff;
        }

        /* Social Media Row - HANYA 3 ICON */
        .social-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .social-label {
            color: #555555;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }

        .social-icon {
            color: #888888;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(30, 30, 30, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .social-icon:hover {
            color: #ffffff;
            background: rgba(60, 60, 60, 0.8);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #444444;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-card {
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .link-card:nth-child(1) {
            animation-delay: 0.05s;
        }

        .link-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .link-card:nth-child(3) {
            animation-delay: 0.15s;
        }

        .link-card:nth-child(4) {
            animation-delay: 0.2s;
        }

        .social-section {
            animation: fadeInUp 0.6s ease-out 0.25s backwards;
        }
    </style>
</head>

<body>

        <!-- Social Media Links - Cuma 3: Instagram, TikTok, Twitter -->

            <div class="social-icons">
                <!-- Instagram -->

                    </svg>
                </a>
                <!-- TikTok -->
                <a href="https://www.tiktok.com/@nafas_opi?is_from_webapp=1&sender_device=pc" class="social-icon"

        <!-- Footer -->
        <div class="footer">
